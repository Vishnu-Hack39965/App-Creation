name: App Screenshot & Video Workflow

on:
  push:
    branches: [ The-working-app ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: The-working-app
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download latest release APK
        run: |
          # Use the direct release URL you confirmed works
          curl -L \
            "https://github.com/Vishnu-Hack39965/App-Creation/releases/latest/download/app-debug.apk" \
            -o app-debug.apk
          echo "APK size: $(du -sh app-debug.apk)"
          [ $(stat -c%s app-debug.apk) -gt 100000 ] \
            || (echo "APK too small — download likely failed!" && exit 1)

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write capture script
        run: |
          cat > capture.sh << 'SCRIPT'
          #!/usr/bin/env bash
          # No set -e — so video is always pulled even if a tap lands wrong

          PKG="com.rakshapal.library"
          MAIN="com.rakshapal.library/.MainActivity"
          DELAY=7   # generous delay for animations to finish

          mkdir -p screenshots

          # ── Helpers ───────────────────────────────────────────────────────
          screenshot() { adb exec-out screencap -p > "screenshots/$1.png" && echo "  ✓ $1.png"; }
          tap()        { adb shell input tap "$1" "$2"; sleep 1; }
          swipe_up()   { adb shell input swipe 540 1400 540 400 600; sleep 2; }
          go_back()    { adb shell input keyevent KEYCODE_BACK; sleep 3; }

          # ── Install ───────────────────────────────────────────────────────
          echo ">>> Installing APK"
          adb install -r app-debug.apk

          echo ">>> Granting permissions"
          adb shell pm grant "$PKG" android.permission.ACCESS_FINE_LOCATION   2>/dev/null || true
          adb shell pm grant "$PKG" android.permission.ACCESS_COARSE_LOCATION 2>/dev/null || true

          echo ">>> Unlock screen"
          adb shell input keyevent 82
          sleep 1

          # ── Start recording ───────────────────────────────────────────────
          echo ">>> Starting screen recording"
          adb shell screenrecord --time-limit 170 /sdcard/demo.mp4 &
          RECORD_PID=$!
          sleep 2

          # ═════════════════════════════════════════════════════════════════
          # PHOTO 1 — Main screen
          # ═════════════════════════════════════════════════════════════════
          echo ""
          echo "=== PHOTO 1: Main Screen ==="
          adb shell am start -n "$MAIN"
          sleep $DELAY
          screenshot "01_main_screen"

          # ═════════════════════════════════════════════════════════════════
          # PHOTO 2 — Offline Dashboard (no data)
          # Tap the top button "📊 Offline Dashboard" in the card
          # Pixel 4: 1080x2280. Card centre ~y=1140. Dashboard btn ~y=1500
          # ═════════════════════════════════════════════════════════════════
          echo ""
          echo "=== PHOTO 2: Dashboard — no data ==="
          tap 540 1500
          sleep $DELAY
          screenshot "02_dashboard_no_data"

          # ═════════════════════════════════════════════════════════════════
          # Now tap "Load Sample Data" button to populate data.
          # This button is near the bottom of the no-data screen.
          # We'll find it by scrolling down first.
          # ═════════════════════════════════════════════════════════════════
          echo ""
          echo "=== Loading sample data via in-app button ==="
          # The no-data screen shows message + sample button below.
          # Scroll down a little to make sure button is visible
          adb shell input swipe 540 1200 540 700 400
          sleep 2
          # Tap sample button — approximately y=1500 after scroll
          tap 540 1500
          sleep 4   # wait for data to save and dashboard to refresh

          screenshot "02b_after_sample_load"

          # ═════════════════════════════════════════════════════════════════
          # PHOTO 3 — Dashboard top (with data: name, survival timer visible)
          # Scroll back to top first
          # ═════════════════════════════════════════════════════════════════
          echo ""
          echo "=== PHOTO 3: Dashboard with data (top) ==="
          adb shell input swipe 540 400 540 1400 400   # scroll to top
          sleep 2
          screenshot "03_dashboard_top_with_data"

          # ═════════════════════════════════════════════════════════════════
          # PHOTO 4 — Dashboard scrolled down (WiFi connect buttons)
          # ═════════════════════════════════════════════════════════════════
          echo ""
          echo "=== PHOTO 4: Dashboard scrolled — WiFi buttons ==="
          swipe_up
          screenshot "04_dashboard_wifi_buttons"

          # ═════════════════════════════════════════════════════════════════
          # PHOTO 5 — After tapping Connect WiFi 1
          # Button is visible on screen after scroll, approx y=900
          # ═════════════════════════════════════════════════════════════════
          echo ""
          echo "=== PHOTO 5: After WiFi connect tap ==="
          tap 540 900
          sleep 4
          screenshot "05_after_wifi_connect"

          # ═════════════════════════════════════════════════════════════════
          # PHOTO 6 — Back to Main screen
          # ═════════════════════════════════════════════════════════════════
          echo ""
          echo "=== PHOTO 6: Main screen (after Dashboard) ==="
          go_back
          sleep 2
          adb shell am start -n "$MAIN"
          sleep $DELAY
          screenshot "06_main_after_dashboard"

          # ═════════════════════════════════════════════════════════════════
          # PHOTO 7 — Go to Home Page (opens Chrome Custom Tab)
          # btnHome is second button in card, approx y=1620
          # ═════════════════════════════════════════════════════════════════
          echo ""
          echo "=== PHOTO 7: Home page (CCT) ==="
          tap 540 1620
          sleep 6
          screenshot "07_home_page_cct"

          # ── Stop recording & pull video ───────────────────────────────────
          echo ""
          echo "=== Pulling video ==="
          kill $RECORD_PID 2>/dev/null || true
          adb shell pkill -2 screenrecord 2>/dev/null || true
          sleep 5
          adb pull /sdcard/demo.mp4 screenshots/demo.mp4 \
            && echo "✓ Video pulled" \
            || echo "✗ Video pull failed"

          echo ""
          echo "=== All done ==="
          ls -lh screenshots/
          SCRIPT
          chmod +x capture.sh

      - name: Run emulator and capture
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: pixel_4
          force-avd-creation: true
          emulator-options: >-
            -no-snapshot
            -no-audio
            -no-window
            -no-boot-anim
            -gpu swiftshader_indirect
            -no-metrics
            -memory 2048
            -cores 2
            -camera-back none
          disable-animations: true
          script: bash capture.sh

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots-and-video
          path: screenshots/
          if-no-files-found: warn

      - name: Push screenshots into repo
        if: always()
        run: |
          FOLDER="screenshots/run-${{ github.run_number }}"
          mkdir -p "$FOLDER"
          cp screenshots/*.png   "$FOLDER/" 2>/dev/null || true
          cp screenshots/demo.mp4 "$FOLDER/" 2>/dev/null || true

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$FOLDER"
          git diff --cached --quiet \
            || git commit -m "ci: screenshots & video run #${{ github.run_number }}"
          git push origin The-working-app
