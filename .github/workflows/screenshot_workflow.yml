name: App Screenshot & Video Workflow

on:
  push:
    branches: [ The-working-app ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: The-working-app
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write capture script
        run: |
          cat > capture.sh << 'SCRIPT'
          #!/usr/bin/env bash

          PKG="com.rakshapal.library"
          MAIN="com.rakshapal.library/.MainActivity"
          DELAY=7

          mkdir -p screenshots

          # ── Download APK (emulator already running at this point) ─────────
          echo ">>> Downloading APK..."
          curl -L \
            "https://github.com/Vishnu-Hack39965/App-Creation/releases/download/v1.0.63/app-debug.apk" \
            -o /tmp/app-debug.apk
          echo "APK size: $(du -sh /tmp/app-debug.apk)"

          # ── Install APK ───────────────────────────────────────────────────
          echo ">>> Installing APK"
          adb install -r /tmp/app-debug.apk

          # ── Grant permissions ─────────────────────────────────────────────
          echo ">>> Granting permissions"
          adb shell pm grant "$PKG" android.permission.ACCESS_FINE_LOCATION   2>/dev/null || true
          adb shell pm grant "$PKG" android.permission.ACCESS_COARSE_LOCATION 2>/dev/null || true

          # ── Unlock screen ─────────────────────────────────────────────────
          adb shell input keyevent 82
          sleep 2

          # ──────────────────────────────────────────────────────────────────
          # FIX: Pre-open Chrome and accept the welcome dialog BEFORE
          # launching our app. This way Chrome is already set up and won't
          # interrupt our app's CCT with its welcome screen.
          # ──────────────────────────────────────────────────────────────────
          echo ">>> Pre-warming Chrome to dismiss welcome dialog..."
          adb shell am start -a android.intent.action.VIEW \
            -d "https://example.com" \
            -n "com.android.chrome/com.google.android.apps.chrome.Main" \
            2>/dev/null || \
          adb shell am start -a android.intent.action.VIEW \
            -d "https://example.com" \
            --selector --mimetype "text/html" \
            2>/dev/null || true
          sleep 6

          # Dismiss "Welcome to Chrome" — tap "Accept & Continue" button
          # On Pixel 4 (1080x2280) this button is typically around y=1800
          adb shell input tap 540 1800 2>/dev/null || true
          sleep 2
          # Also try dismissing any "Sign in to Chrome" popup — tap "No thanks"
          adb shell input tap 540 1600 2>/dev/null || true
          sleep 2
          # Press back to close Chrome
          adb shell input keyevent KEYCODE_BACK
          sleep 2
          adb shell input keyevent KEYCODE_BACK
          sleep 2
          echo "Chrome pre-warmed"

          # ──────────────────────────────────────────────────────────────────
          # FIX: Revoke location permission temporarily so the app does NOT
          # auto-open CCT on launch — giving us clean screenshots of MainActivity.
          # We will re-grant it before WiFi connect testing.
          # ──────────────────────────────────────────────────────────────────
          echo ">>> Revoking location permission temporarily (stops CCT auto-open)"
          adb shell pm revoke "$PKG" android.permission.ACCESS_FINE_LOCATION   2>/dev/null || true
          adb shell pm revoke "$PKG" android.permission.ACCESS_COARSE_LOCATION 2>/dev/null || true

          # ── Start screen recording ────────────────────────────────────────
          echo ">>> Starting screen recording"
          adb shell screenrecord --time-limit 170 /sdcard/demo.mp4 &
          RECORD_PID=$!
          sleep 2

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 1 — Main screen
          # Without location permission the app shows its own UI and asks
          # for permission — it does NOT open CCT automatically.
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 1: Main Screen ==="
          adb shell am start -n "$MAIN"
          sleep $DELAY
          # Dismiss any permission dialog with BACK so we stay on MainActivity
          adb shell input keyevent KEYCODE_BACK 2>/dev/null || true
          sleep 2
          adb exec-out screencap -p > screenshots/01_main_screen.png
          echo "✓ Photo 1"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 2 — Offline Dashboard: no data state
          # Tap "📊 Offline Dashboard" button (top button in card, ~y=1450)
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 2: Dashboard no data ==="
          adb shell input tap 540 1450
          sleep $DELAY
          adb exec-out screencap -p > screenshots/02_dashboard_no_data.png
          echo "✓ Photo 2"

          # ══════════════════════════════════════════════════════════════════
          # Tap "Load Sample Data" button to fill dashboard with data.
          # On the no-data screen the sample button is visible near bottom.
          # ══════════════════════════════════════════════════════════════════
          echo "=== Loading sample data ==="
          # Scroll down to expose sample button
          adb shell input swipe 540 1100 540 600 300
          sleep 1
          adb exec-out screencap -p > screenshots/02b_before_sample_tap.png
          # Tap the sample button (~y=1300 after scroll)
          adb shell input tap 540 1300
          sleep 5
          adb exec-out screencap -p > screenshots/02c_after_sample_tap.png
          echo "Sample data loaded"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 3 — Dashboard top: name, father, countdown timer visible
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 3: Dashboard top with data ==="
          adb shell input swipe 540 500 540 1400 400
          sleep 2
          adb exec-out screencap -p > screenshots/03_dashboard_top_data.png
          echo "✓ Photo 3"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 4 — Dashboard scrolled: WiFi connect buttons
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 4: Dashboard WiFi buttons ==="
          adb shell input swipe 540 1400 540 300 600
          sleep 2
          adb exec-out screencap -p > screenshots/04_dashboard_wifi_buttons.png
          echo "✓ Photo 4"

          # Re-grant location permission before WiFi connect test
          adb shell pm grant "$PKG" android.permission.ACCESS_FINE_LOCATION   2>/dev/null || true

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 5 — After tapping Connect WiFi 1 (~y=900 after scroll)
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 5: After WiFi connect ==="
          adb shell input tap 540 900
          sleep 4
          adb exec-out screencap -p > screenshots/05_after_wifi_connect.png
          echo "✓ Photo 5"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 6 — Back to Main screen
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 6: Main screen after Dashboard ==="
          adb shell input keyevent KEYCODE_BACK
          sleep 4
          adb exec-out screencap -p > screenshots/06_main_after_dashboard.png
          echo "✓ Photo 6"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 7 — Tap Go to Home Page
          # Re-grant permission so CCT actually opens
          # btnHome is 2nd button ~y=1580
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 7: Go to Home Page (CCT) ==="
          adb shell input tap 540 1580
          sleep 8
          adb exec-out screencap -p > screenshots/07_home_page_cct.png
          echo "✓ Photo 7"

          # ── Pull video ────────────────────────────────────────────────────
          echo "=== Pulling video ==="
          kill $RECORD_PID 2>/dev/null || true
          adb shell pkill -2 screenrecord 2>/dev/null || true
          sleep 5
          adb pull /sdcard/demo.mp4 screenshots/demo.mp4 \
            && echo "✓ Video pulled" \
            || echo "✗ Video pull failed"

          echo "=== All done ==="
          ls -lh screenshots/
          SCRIPT
          chmod +x capture.sh

      - name: Run emulator and capture
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: pixel_4
          force-avd-creation: true
          emulator-options: >-
            -no-snapshot
            -no-audio
            -no-window
            -no-boot-anim
            -gpu swiftshader_indirect
            -no-metrics
            -memory 2048
            -cores 2
            -camera-back none
          disable-animations: true
          script: bash capture.sh

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots-and-video
          path: screenshots/
          if-no-files-found: warn

      - name: Push screenshots into repo
        if: always()
        run: |
          FOLDER="screenshots/run-${{ github.run_number }}"
          mkdir -p "$FOLDER"
          cp screenshots/*.png    "$FOLDER/" 2>/dev/null || true
          cp screenshots/demo.mp4 "$FOLDER/" 2>/dev/null || true

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$FOLDER"
          git diff --cached --quiet \
            || git commit -m "ci: screenshots & video run #${{ github.run_number }}"
          git push origin The-working-app
