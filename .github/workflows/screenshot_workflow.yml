name: App Screenshot & Video Workflow

on:
  push:
    branches: [ The-working-app ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: The-working-app
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write capture script
        run: |
          cat > capture.sh << 'SCRIPT'
          #!/usr/bin/env bash

          PKG="com.rakshapal.library"
          MAIN="com.rakshapal.library/.MainActivity"
          DELAY=8

          mkdir -p screenshots

          # ── STEP 1: Download APK now (emulator is already running) ────────
          echo ">>> Downloading APK into emulator runner..."
          curl -L \
            "https://github.com/Vishnu-Hack39965/App-Creation/releases/download/v1.0.63/app-debug.apk" \
            -o /tmp/app-debug.apk
          echo "APK size: $(du -sh /tmp/app-debug.apk)"

          # ── STEP 2: Install ───────────────────────────────────────────────
          echo ">>> Installing APK on emulator"
          adb install -r /tmp/app-debug.apk
          echo "Install done"

          # ── STEP 3: Grant permissions ─────────────────────────────────────
          echo ">>> Granting permissions"
          adb shell pm grant "$PKG" android.permission.ACCESS_FINE_LOCATION   2>/dev/null || true
          adb shell pm grant "$PKG" android.permission.ACCESS_COARSE_LOCATION 2>/dev/null || true

          # ── STEP 4: Unlock screen ─────────────────────────────────────────
          adb shell input keyevent 82
          sleep 2

          # ── STEP 5: Launch app FIRST to confirm it works ──────────────────
          echo ">>> Launching app"
          adb shell am start -n "$MAIN"
          sleep $DELAY

          # ── STEP 6: Start screen recording AFTER app is open ─────────────
          echo ">>> Starting screen recording"
          adb shell screenrecord --time-limit 170 /sdcard/demo.mp4 &
          RECORD_PID=$!
          sleep 2

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 1 — Main screen (app already open)
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 1: Main Screen ==="
          adb exec-out screencap -p > screenshots/01_main_screen.png
          echo "✓ Photo 1"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 2 — Offline Dashboard: no data state
          # Tap the top button "📊 Offline Dashboard"
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 2: Dashboard no data ==="
          # Pixel 4 is 1080x2280. The card has 3 buttons stacked.
          # We find the button by tapping screen centre-X, and Y just below
          # vertical centre (card is centred on screen, buttons start ~y=1450)
          adb shell input tap 540 1450
          sleep $DELAY
          adb exec-out screencap -p > screenshots/02_dashboard_no_data.png
          echo "✓ Photo 2"

          # ══════════════════════════════════════════════════════════════════
          # Tap "Load Sample Data" button to populate data.
          # On no-data screen this button is shown near bottom.
          # ══════════════════════════════════════════════════════════════════
          echo "=== Tapping Load Sample Data ==="
          # Scroll down slightly to expose button
          adb shell input swipe 540 1100 540 700 300
          sleep 1
          adb exec-out screencap -p > screenshots/02b_before_sample_tap.png
          # Tap button (centred, near bottom of visible area ~y=1400)
          adb shell input tap 540 1400
          sleep 5
          adb exec-out screencap -p > screenshots/02c_after_sample_tap.png
          echo "✓ Sample data loaded"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 3 — Dashboard top with data (scroll back to top)
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 3: Dashboard with data (top) ==="
          adb shell input swipe 540 500 540 1400 400
          sleep 2
          adb exec-out screencap -p > screenshots/03_dashboard_with_data_top.png
          echo "✓ Photo 3"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 4 — Dashboard scrolled: WiFi buttons
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 4: Dashboard scrolled (WiFi buttons) ==="
          adb shell input swipe 540 1400 540 400 500
          sleep 2
          adb exec-out screencap -p > screenshots/04_dashboard_wifi_buttons.png
          echo "✓ Photo 4"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 5 — After tapping Connect WiFi 1
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 5: After WiFi connect tap ==="
          adb shell input tap 540 900
          sleep 4
          adb exec-out screencap -p > screenshots/05_after_wifi_connect.png
          echo "✓ Photo 5"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 6 — Back to Main screen
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 6: Main screen (after Dashboard) ==="
          adb shell input keyevent KEYCODE_BACK
          sleep 4
          adb exec-out screencap -p > screenshots/06_main_after_dashboard.png
          echo "✓ Photo 6"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 7 — Tap Go to Home Page (Chrome Custom Tab)
          # btnHome is 2nd button ~y=1580
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 7: Go to Home Page ==="
          adb shell input tap 540 1580
          sleep 7
          adb exec-out screencap -p > screenshots/07_home_page_cct.png
          echo "✓ Photo 7"

          # ══════════════════════════════════════════════════════════════════
          # Pull video
          # ══════════════════════════════════════════════════════════════════
          echo "=== Pulling video ==="
          kill $RECORD_PID 2>/dev/null || true
          adb shell pkill -2 screenrecord 2>/dev/null || true
          sleep 5
          adb pull /sdcard/demo.mp4 screenshots/demo.mp4 \
            && echo "✓ Video pulled" \
            || echo "✗ Video pull failed"

          echo ""
          echo "=== All done ==="
          ls -lh screenshots/
          SCRIPT
          chmod +x capture.sh

      - name: Run emulator and capture
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: pixel_4
          force-avd-creation: true
          emulator-options: >-
            -no-snapshot
            -no-audio
            -no-window
            -no-boot-anim
            -gpu swiftshader_indirect
            -no-metrics
            -memory 2048
            -cores 2
            -camera-back none
          disable-animations: true
          script: bash capture.sh

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots-and-video
          path: screenshots/
          if-no-files-found: warn

      - name: Push screenshots into repo
        if: always()
        run: |
          FOLDER="screenshots/run-${{ github.run_number }}"
          mkdir -p "$FOLDER"
          cp screenshots/*.png    "$FOLDER/" 2>/dev/null || true
          cp screenshots/demo.mp4 "$FOLDER/" 2>/dev/null || true

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$FOLDER"
          git diff --cached --quiet \
            || git commit -m "ci: screenshots & video run #${{ github.run_number }}"
          git push origin The-working-app
