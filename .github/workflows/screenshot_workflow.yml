name: App Screenshot & Video Workflow

on:
  workflow_dispatch:

permissions:
  contents: write   # needed to push screenshots folder back to repo

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: The-working-app
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Download latest APK ──────────────────────────────────────────────
      - name: Download latest release APK
        run: |
          curl -L \
            "https://github.com/Vishnu-Hack39965/App-Creation/releases/latest/download/app-debug.apk" \
            -o app-debug.apk
          echo "APK size: $(du -sh app-debug.apk)"
          [ $(stat -c%s app-debug.apk) -gt 10000 ] || (echo "APK download failed or too small!" && exit 1)

      # ── Set up Java 17 ───────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Enable KVM ────────────────────────────────────────────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      # ── FIX: Set up Android SDK properly with PATH ────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── FIX: Install packages AFTER setup-android so sdkmanager is in PATH ─
      - name: Install emulator and system image, create AVD
        run: |
          # Accept licenses
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

          # Install packages
          sdkmanager \
            "system-images;android-31;google_apis;x86_64" \
            "emulator" \
            "platform-tools" \
            "platforms;android-31"

          # Create AVD
          echo "no" | avdmanager create avd \
            -n TestAVD \
            -k "system-images;android-31;google_apis;x86_64" \
            --device "pixel_4" \
            --force

          # Verify AVD exists — fail here before wasting time starting emulator
          avdmanager list avd | grep "TestAVD" \
            || (echo "ERROR: AVD creation failed!" && exit 1)
          echo "AVD created successfully."

      # ── Start emulator ────────────────────────────────────────────────────
      - name: Start Android emulator
        timeout-minutes: 10
        run: |
          $ANDROID_HOME/emulator/emulator \
            -avd TestAVD \
            -no-snapshot \
            -no-audio \
            -no-window \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -accel on \
            -memory 2048 \
            -cores 2 \
            2>&1 &

          echo "Emulator started. Waiting for device..."
          adb wait-for-device

          echo "Device found. Waiting for full boot..."
          BOOT_TIMEOUT=60
          COUNT=0
          until adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; do
            echo "  [${COUNT}/${BOOT_TIMEOUT}] Still booting..."
            sleep 5
            COUNT=$((COUNT+1))
            if [ $COUNT -ge $BOOT_TIMEOUT ]; then
              echo "Boot timed out!"
              exit 1
            fi
          done

          sleep 8
          adb shell input keyevent 82 || true
          sleep 2
          echo "Emulator ready."

      # ── Install APK ───────────────────────────────────────────────────────
      - name: Install APK
        run: |
          adb install -r app-debug.apk
          echo "APK installed."

      # ── Start screen recording ────────────────────────────────────────────
      - name: Start screen recording
        run: |
          adb shell "screenrecord --time-limit 180 /sdcard/demo.mp4" &
          echo $! > screenrecord.pid
          sleep 2
          echo "Screen recording started."

      # ── Capture screenshots ───────────────────────────────────────────────
      - name: Run screenshot workflow
        id: screenshots
        continue-on-error: true
        run: |
          mkdir -p screenshots
          DELAY=4
          PKG="com.rakshapal.library"
          MAIN_ACT="$PKG/.MainActivity"
          DASH_ACT="$PKG/.OfflineDashboardActivity"

          # Grant permissions upfront
          adb shell pm grant $PKG android.permission.ACCESS_FINE_LOCATION   2>/dev/null || true
          adb shell pm grant $PKG android.permission.ACCESS_COARSE_LOCATION 2>/dev/null || true

          # ── Photo 1: Main screen ─────────────────────────────────────────
          adb shell am start -n "$MAIN_ACT"
          sleep $DELAY
          adb exec-out screencap -p > screenshots/01_main_screen.png
          echo "Screenshot 1: Main Screen ✅"

          # ── Photo 2: Dashboard — no data (first time) ────────────────────
          adb shell am start -n "$DASH_ACT"
          sleep $DELAY
          adb exec-out screencap -p > screenshots/02_dashboard_no_data.png
          echo "Screenshot 2: Dashboard No Data ✅"

          # ── Inject sample data using run-as (debug APK) ──────────────────
          adb shell "run-as $PKG sh -c \
            'printf \"name=Ramesh Kumar\nfather=Suresh Kumar\nphone=9876543210\naddress=12 Gandhi Nagar Agra UP 282001\n\" \
            > /data/data/$PKG/files/user_data.txt'" || echo "user_data inject failed"

          SSID_B64=$(echo -n "Library_WiFi_5G" | base64 -w0)
          PASS_B64=$(echo -n "library@2024"     | base64 -w0)
          SSID2_B64=$(echo -n "Library_WiFi_2G" | base64 -w0)
          PASS2_B64=$(echo -n "library@2024"    | base64 -w0)

          adb shell "run-as $PKG sh -c \
            'printf \"ssid=${SSID_B64}\npass=${PASS_B64}\nssid2=${SSID2_B64}\npass2=${PASS2_B64}\n\" \
            > /data/data/$PKG/files/wifi_data.txt'" || echo "wifi_data inject failed"

          EPOCH_MS=$(date +%s%3N)
          SURVIVAL_B64=$(echo -n "5.75|${EPOCH_MS}" | base64 -w0)
          adb shell "run-as $PKG sh -c \
            'echo \"${SURVIVAL_B64}\" > /data/data/$PKG/files/survival.txt'" || echo "survival inject failed"

          echo "Sample data injected."

          # ── Photo 3: Dashboard with data ─────────────────────────────────
          adb shell am start -n "$DASH_ACT"
          sleep $DELAY
          adb exec-out screencap -p > screenshots/03_dashboard_with_data.png
          echo "Screenshot 3: Dashboard With Data ✅"

          # ── Tap 'Load Sample Data' button ─────────────────────────────────
          adb shell input tap 540 1750 || true
          sleep 3
          adb exec-out screencap -p > screenshots/03b_after_sample_button.png
          echo "Screenshot 3b: After Sample Button ✅"

          # ── Scroll down to see WiFi buttons ───────────────────────────────
          adb shell input swipe 540 1200 540 400 600 || true
          sleep 2
          adb exec-out screencap -p > screenshots/03c_dashboard_scrolled.png
          echo "Screenshot 3c: Dashboard Scrolled ✅"

          # ── Tap WiFi connect button ───────────────────────────────────────
          adb shell input tap 540 900 || true
          sleep 3
          adb exec-out screencap -p > screenshots/03d_after_wifi_connect.png
          echo "Screenshot 3d: After WiFi Connect ✅"

          # ── Back to Main screen ───────────────────────────────────────────
          adb shell input keyevent KEYCODE_BACK || true
          sleep 2
          adb shell am start -n "$MAIN_ACT"
          sleep $DELAY
          adb exec-out screencap -p > screenshots/04_main_after_dashboard.png
          echo "Screenshot 4: Main After Dashboard ✅"

          # ── Tap Go to Home Page ────────────────────────────────────────────
          adb shell input tap 540 1300 || true
          sleep 5
          adb exec-out screencap -p > screenshots/05_home_page_cct.png
          echo "Screenshot 5: Home Page CCT ✅"

          echo "All screenshots done."

      # ── Stop screen recording & pull video ───────────────────────────────
      - name: Stop screen recording and pull video
        if: always()
        run: |
          if [ -f screenrecord.pid ]; then
            kill $(cat screenrecord.pid) 2>/dev/null || true
          fi
          adb shell pkill -2 screenrecord 2>/dev/null || true
          sleep 4
          adb pull /sdcard/demo.mp4 screenshots/demo.mp4 \
            || echo "Video pull failed"

      # ── Upload as GitHub Actions artifact (always) ────────────────────────
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots-and-video
          path: screenshots/
          if-no-files-found: warn

      # ── ALSO push screenshots folder directly into repo ───────────────────
      - name: Push screenshots into repo folder
        if: always()
        run: |
          # Name the folder with run number so each run has its own folder
          FOLDER="screenshots/run-${{ github.run_number }}"
          mkdir -p "$FOLDER"
          cp screenshots/*.png "$FOLDER/" 2>/dev/null || true
          cp screenshots/demo.mp4 "$FOLDER/" 2>/dev/null || true

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$FOLDER"
          git diff --cached --quiet \
            || git commit -m "ci: add screenshots & video from run #${{ github.run_number }}"
          git push origin The-working-app
