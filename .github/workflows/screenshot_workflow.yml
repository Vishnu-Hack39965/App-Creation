name: App Screenshot & Video Workflow

on:
  push:
    branches: [ The-working-app ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: The-working-app
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write capture script
        run: |
          cat > capture.sh << 'SCRIPT'
          #!/usr/bin/env bash

          PKG="com.rakshapal.library"
          MAIN="com.rakshapal.library/.MainActivity"
          DELAY=7

          mkdir -p screenshots

          # ── Download APK ──────────────────────────────────────────────────
          echo ">>> Downloading APK..."
          curl -L \
            "https://github.com/Vishnu-Hack39965/App-Creation/releases/download/v1.0.63/app-debug.apk" \
            -o /tmp/app-debug.apk
          echo "APK size: $(du -sh /tmp/app-debug.apk)"

          # ── Install ───────────────────────────────────────────────────────
          echo ">>> Installing APK"
          adb install -r /tmp/app-debug.apk

          # ── Grant permissions ─────────────────────────────────────────────
          adb shell pm grant "$PKG" android.permission.ACCESS_FINE_LOCATION   2>/dev/null || true
          adb shell pm grant "$PKG" android.permission.ACCESS_COARSE_LOCATION 2>/dev/null || true

          # ── Unlock screen ─────────────────────────────────────────────────
          adb shell input keyevent 82
          sleep 2

          # ── Pre-warm Chrome to dismiss its welcome dialog ─────────────────
          echo ">>> Pre-warming Chrome..."
          adb shell am start -a android.intent.action.VIEW \
            -d "https://example.com" \
            -n "com.android.chrome/com.google.android.apps.chrome.Main" \
            2>/dev/null || true
          sleep 7
          # Tap "Accept & Continue" (centre-bottom of screen ~y=1800)
          adb shell input tap 540 1800 || true
          sleep 2
          # Tap "No thanks" on sign-in prompt (~y=1600)
          adb shell input tap 540 1600 || true
          sleep 2
          # Close Chrome
          adb shell input keyevent KEYCODE_BACK
          sleep 1
          adb shell input keyevent KEYCODE_BACK
          sleep 2
          echo "Chrome pre-warmed"

          # ── Revoke location so app doesn't auto-open CCT ──────────────────
          adb shell pm revoke "$PKG" android.permission.ACCESS_FINE_LOCATION   2>/dev/null || true
          adb shell pm revoke "$PKG" android.permission.ACCESS_COARSE_LOCATION 2>/dev/null || true

          # ── Start recording ───────────────────────────────────────────────
          echo ">>> Starting recording"
          adb shell screenrecord --time-limit 170 /sdcard/demo.mp4 &
          RECORD_PID=$!
          sleep 2

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 1 — Main screen
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 1: Main Screen ==="
          adb shell am start -n "$MAIN"
          sleep $DELAY
          # Dismiss permission dialog with Back so we stay on main screen
          adb shell input keyevent KEYCODE_BACK 2>/dev/null || true
          sleep 2
          adb exec-out screencap -p > screenshots/01_main_screen.png
          echo "✓ Photo 1"

          # ──────────────────────────────────────────────────────────────────
          # REAL BUTTON COORDINATES from Photo 1 (1080x2280 screen):
          #   Offline Dashboard btn  centre → x=370, y=785
          #   Go to Home Page btn    centre → x=370, y=915
          #   Exit App btn           centre → x=370, y=1043
          # ──────────────────────────────────────────────────────────────────
          sleep 2
          echo "=== Google Sign in accepted ==="
          adb shell input tap 370 980
          sleep 2
          # ══════════════════════════════════════════════════════════════════
          # PHOTO 2 — Offline Dashboard: no data
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 2: Dashboard no data ==="
          adb shell input tap 370 785
          sleep $DELAY
          adb exec-out screencap -p > screenshots/02_dashboard_no_data.png
          echo "✓ Photo 2"

          # ══════════════════════════════════════════════════════════════════
          # Load sample data — tap the "Load Sample Data" button.
          # On no-data screen it appears near bottom. Take debug shot first.
          # ══════════════════════════════════════════════════════════════════
          echo "=== Loading sample data ==="
          adb exec-out screencap -p > screenshots/02b_debug_before_sample.png
          # Scroll down to expose sample button
          adb shell input swipe 370 1200 370 800 300
          sleep 1
          adb exec-out screencap -p > screenshots/02c_debug_after_scroll.png
          # Tap sample button (mid-screen after scroll ~y=1100)
          adb shell input tap 370 1100
          sleep 5
          adb exec-out screencap -p > screenshots/02d_after_sample_load.png
          echo "Sample data loaded"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 3 — Dashboard top with data
          # Scroll back to top
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 3: Dashboard with data (top) ==="
          adb shell input swipe 370 600 370 1400 400
          sleep 2
          adb exec-out screencap -p > screenshots/03_dashboard_data_top.png
          echo "✓ Photo 3"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 4 — Dashboard scrolled: WiFi buttons
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 4: Dashboard WiFi buttons ==="
          adb shell input swipe 370 1400 370 400 500
          sleep 2
          adb exec-out screencap -p > screenshots/04_dashboard_wifi_buttons.png
          echo "✓ Photo 4"

          # Re-grant location for WiFi connect
          adb shell pm grant "$PKG" android.permission.ACCESS_FINE_LOCATION 2>/dev/null || true

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 5 — After tapping WiFi 1 connect button
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 5: After WiFi connect ==="
          # Take debug shot to see exact button positions after scroll
          adb exec-out screencap -p > screenshots/04b_debug_wifi_positions.png
          adb shell input tap 370 900
          sleep 4
          adb exec-out screencap -p > screenshots/05_after_wifi_connect.png
          echo "✓ Photo 5"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 6 — Back to Main screen
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 6: Main after Dashboard ==="
          adb shell input keyevent KEYCODE_BACK
          sleep 4
          adb exec-out screencap -p > screenshots/06_main_after_dashboard.png
          echo "✓ Photo 6"

          # ══════════════════════════════════════════════════════════════════
          # PHOTO 7 — Tap Go to Home Page
          # From Photo 1: btnHome centre is x=370, y=915
          # ══════════════════════════════════════════════════════════════════
          echo "=== PHOTO 7: Home Page (CCT) ==="
          adb shell input tap 370 915
          sleep 8
          adb exec-out screencap -p > screenshots/07_home_page_cct.png
          echo "✓ Photo 7"

          # ── Pull video ────────────────────────────────────────────────────
          echo "=== Pulling video ==="
          kill $RECORD_PID 2>/dev/null || true
          adb shell pkill -2 screenrecord 2>/dev/null || true
          sleep 5
          adb pull /sdcard/demo.mp4 screenshots/demo.mp4 \
            && echo "✓ Video pulled" \
            || echo "✗ Video pull failed"

          echo "=== All done ==="
          ls -lh screenshots/
          SCRIPT
          chmod +x capture.sh

      - name: Run emulator and capture
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: pixel_4
          force-avd-creation: true
          emulator-options: >-
            -no-snapshot
            -no-audio
            -no-window
            -no-boot-anim
            -gpu swiftshader_indirect
            -no-metrics
            -memory 2048
            -cores 2
            -camera-back none
          disable-animations: true
          script: bash capture.sh

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots-and-video
          path: screenshots/
          if-no-files-found: warn

      - name: Push screenshots into repo
        if: always()
        run: |
          FOLDER="screenshots/run-${{ github.run_number }}"
          mkdir -p "$FOLDER"
          cp screenshots/*.png    "$FOLDER/" 2>/dev/null || true
          cp screenshots/demo.mp4 "$FOLDER/" 2>/dev/null || true

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$FOLDER"
          git diff --cached --quiet \
            || git commit -m "ci: screenshots & video run #${{ github.run_number }}"
          git push origin The-working-app
