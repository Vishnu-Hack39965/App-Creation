name: App Screenshot & Video Workflow

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: The-working-app

      # ── Download latest APK ──────────────────────────────────────────────
      - name: Download latest release APK
        run: |
          curl -L \
            "https://github.com/Vishnu-Hack39965/App-Creation/releases/latest/download/app-debug.apk" \
            -o app-debug.apk
          echo "APK size: $(du -sh app-debug.apk)"
          # Fail early if APK download failed or is too small
          [ $(stat -c%s app-debug.apk) -gt 10000 ] || (echo "APK download failed or too small!" && exit 1)

      # ── Set up Java 17 ───────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Enable KVM for emulator acceleration ─────────────────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      # ── Install Android SDK + emulator + system image ────────────────────
      # FIX: Combined into ONE step so AVD is created before emulator starts
      - name: Set up Android SDK and create AVD
        run: |
          # Accept all licenses non-interactively
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

          # Install required packages
          sdkmanager --install \
            "system-images;android-31;google_apis;x86_64" \
            "emulator" \
            "platform-tools" \
            "platforms;android-31"

          # Create AVD — FIX: pipe 'no' to avoid hardware profile prompt
          echo "no" | avdmanager create avd \
            -n TestAVD \
            -k "system-images;android-31;google_apis;x86_64" \
            --device "pixel_4" \
            --force

          # Verify AVD was actually created — FIX: fail here if missing
          avdmanager list avd | grep "TestAVD" || (echo "AVD creation FAILED!" && exit 1)
          echo "AVD created successfully."

      # ── Start emulator ────────────────────────────────────────────────────
      # FIX: Proper boot wait with timeout so it never hangs forever
      - name: Start Android emulator
        timeout-minutes: 10
        run: |
          # Start emulator in background
          $ANDROID_HOME/emulator/emulator \
            -avd TestAVD \
            -no-snapshot \
            -no-audio \
            -no-window \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -accel on \
            -memory 2048 \
            -cores 2 \
            2>&1 &

          echo "Emulator process started. Waiting for device..."

          # FIX: wait-for-device with explicit timeout (120s)
          adb wait-for-device -t 120 || (echo "Device never appeared!" && exit 1)

          echo "Device connected. Waiting for full boot..."

          # FIX: Boot wait loop with a hard timeout counter (max 180 tries × 5s = 15 min cap)
          BOOT_TIMEOUT=60
          COUNT=0
          until adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; do
            echo "  [${COUNT}/${BOOT_TIMEOUT}] Still booting..."
            sleep 5
            COUNT=$((COUNT+1))
            if [ $COUNT -ge $BOOT_TIMEOUT ]; then
              echo "Boot timed out after $((BOOT_TIMEOUT * 5))s!"
              exit 1
            fi
          done

          # Extra settle time after boot
          sleep 8

          # Unlock screen
          adb shell input keyevent 82 || true
          sleep 2

          echo "Emulator fully booted and ready."

      # ── Install the APK ───────────────────────────────────────────────────
      - name: Install APK
        run: |
          adb install -r app-debug.apk
          echo "APK installed successfully."

      # ── Start screen recording in background ──────────────────────────────
      - name: Start screen recording
        run: |
          # screenrecord max duration 180s (3 min) — adjust if needed
          adb shell "screenrecord --time-limit 180 /sdcard/demo.mp4" &
          echo $! > screenrecord.pid
          sleep 2
          echo "Screen recording started."

      # ── Run workflow & capture screenshots ───────────────────────────────
      - name: Run screenshot workflow
        id: screenshots
        continue-on-error: true
        run: |
          mkdir -p screenshots
          DELAY=4
          PKG="com.rakshapal.library"
          MAIN_ACT="$PKG/.MainActivity"
          DASH_ACT="$PKG/.OfflineDashboardActivity"

          # Grant location permission upfront so app doesn't block on dialog
          adb shell pm grant $PKG android.permission.ACCESS_FINE_LOCATION 2>/dev/null || true
          adb shell pm grant $PKG android.permission.ACCESS_COARSE_LOCATION 2>/dev/null || true

          # ── Photo 1: Main screen ─────────────────────────────────────────
          echo "--- Step 1: Main Screen ---"
          adb shell am start -n "$MAIN_ACT"
          sleep $DELAY
          adb exec-out screencap -p > screenshots/01_main_screen.png
          echo "Screenshot 1 captured: Main Screen"

          # ── Photo 2: Offline Dashboard (no data — first time) ───────────
          echo "--- Step 2: Dashboard No Data ---"
          adb shell am start -n "$DASH_ACT"
          sleep $DELAY
          adb exec-out screencap -p > screenshots/02_dashboard_no_data.png
          echo "Screenshot 2 captured: Dashboard (no data)"

          # ── Inject sample data directly into app's private files ─────────
          # FIX: Use 'run-as' which works on debug APKs without root
          echo "--- Injecting sample data ---"

          # user_data.txt (plain text)
          adb shell "run-as $PKG sh -c \
            'echo \"name=Ramesh Kumar\" > /data/data/$PKG/files/user_data.txt && \
             echo \"father=Suresh Kumar\" >> /data/data/$PKG/files/user_data.txt && \
             echo \"phone=9876543210\" >> /data/data/$PKG/files/user_data.txt && \
             echo \"address=12 Gandhi Nagar Agra UP 282001\" >> /data/data/$PKG/files/user_data.txt'" \
            || echo "user_data inject failed (will use sample button instead)"

          # wifi_data.txt (Base64 encoded values — matching app's encode format)
          SSID_B64=$(echo -n "Library_WiFi_5G"  | base64 -w0)
          PASS_B64=$(echo -n "library@2024"      | base64 -w0)
          SSID2_B64=$(echo -n "Library_WiFi_2G" | base64 -w0)
          PASS2_B64=$(echo -n "library@2024"     | base64 -w0)

          adb shell "run-as $PKG sh -c \
            'echo \"ssid=$SSID_B64\" > /data/data/$PKG/files/wifi_data.txt && \
             echo \"pass=$PASS_B64\" >> /data/data/$PKG/files/wifi_data.txt && \
             echo \"ssid2=$SSID2_B64\" >> /data/data/$PKG/files/wifi_data.txt && \
             echo \"pass2=$PASS2_B64\" >> /data/data/$PKG/files/wifi_data.txt'" \
            || echo "wifi_data inject failed"

          # survival.txt: Base64( "5.75|<epochMillis>" )
          EPOCH_MS=$(date +%s%3N)
          RAW="5.75|${EPOCH_MS}"
          SURVIVAL_B64=$(echo -n "$RAW" | base64 -w0)

          adb shell "run-as $PKG sh -c \
            'echo \"$SURVIVAL_B64\" > /data/data/$PKG/files/survival.txt'" \
            || echo "survival inject failed"

          echo "Sample data injection attempted."

          # ── Photo 3: Dashboard with injected data ────────────────────────
          echo "--- Step 3: Dashboard With Data ---"
          adb shell am start -n "$DASH_ACT"
          sleep $DELAY
          adb exec-out screencap -p > screenshots/03_dashboard_with_data.png
          echo "Screenshot 3 captured: Dashboard with injected data"

          # ── Tap 'Load Sample Data' button as backup ───────────────────────
          # Button is near bottom of screen — using approximate centre coords
          # (540 = centre X on 1080px screen; 1750 = approximate Y for last button)
          adb shell input tap 540 1750 || true
          sleep 3
          adb exec-out screencap -p > screenshots/03b_after_sample_button.png
          echo "Screenshot 3b captured: After sample data button tap"

          # ── Scroll down to see WiFi buttons ──────────────────────────────
          adb shell input swipe 540 1200 540 400 500 || true
          sleep 2
          adb exec-out screencap -p > screenshots/03c_dashboard_scrolled.png
          echo "Screenshot 3c captured: Dashboard scrolled (WiFi buttons visible)"

          # ── Tap Connect to WiFi 1 button ──────────────────────────────────
          adb shell input tap 540 900 || true
          sleep 3
          adb exec-out screencap -p > screenshots/03d_after_wifi_connect.png
          echo "Screenshot 3d captured: After WiFi connect tap"

          # ── Back to Dashboard top ─────────────────────────────────────────
          adb shell input swipe 540 400 540 1200 500 || true
          sleep 1

          # ── Photo 4: Press Back → Main screen ────────────────────────────
          echo "--- Step 4: Back to Main Screen ---"
          adb shell input keyevent KEYCODE_BACK || true
          sleep 2
          adb exec-out screencap -p > screenshots/04_main_after_dashboard.png
          echo "Screenshot 4 captured: Main screen after closing Dashboard"

          # ── Photo 5: Tap Go to Home Page (CCT) ───────────────────────────
          echo "--- Step 5: Home Page (CCT) ---"
          # Tap the Home button (2nd button in card — approx Y 1300 on Pixel 4)
          adb shell input tap 540 1300 || true
          sleep 5
          adb exec-out screencap -p > screenshots/05_home_page_cct.png
          echo "Screenshot 5 captured: Home Page (Chrome Custom Tab)"

          echo "All screenshots captured."

      # ── Stop screen recording & pull video ───────────────────────────────
      - name: Stop screen recording and pull video
        if: always()
        run: |
          # Kill our local background pid
          if [ -f screenrecord.pid ]; then
            kill $(cat screenrecord.pid) 2>/dev/null || true
          fi
          # Send SIGINT to screenrecord on device so it finalises the MP4
          adb shell pkill -2 screenrecord 2>/dev/null || true
          sleep 4
          # Pull the video
          adb pull /sdcard/demo.mp4 screenshots/demo.mp4 \
            || echo "Video pull failed — partial or no file"
          echo "Video step done."

      # ── Upload everything — always, even on failure ───────────────────────
      - name: Upload screenshots and video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots-and-video
          path: screenshots/
          if-no-files-found: warn
