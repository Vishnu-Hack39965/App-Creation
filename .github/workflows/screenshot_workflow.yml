name: App Screenshot & Video Workflow

on:
  push:
    branches: [ The-working-app ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: The-working-app
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write capture script
        run: |
          cat > capture.sh << 'SCRIPT'
          #!/usr/bin/env bash

          PKG="com.rakshapal.library"
          MAIN="com.rakshapal.library/.MainActivity"
          DELAY=7
          STEP=0

          mkdir -p screenshots

          # ════════════════════════════════════════════════════════════════
          # HELPER: tap_text "<text to find>" [optional_timeout_seconds]
          #
          #   1. Dumps current UI hierarchy via uiautomator
          #   2. Searches for an element whose text OR content-desc CONTAINS
          #      the given string (case-sensitive substring match)
          #   3. Calculates the centre of its bounds
          #   4. Echoes the coordinates found
          #   5. Taps that centre point
          #
          #   Returns 0 if found+tapped, 1 if not found (caller can decide
          #   whether that's fatal or just "skip, wasn't needed this run")
          # ════════════════════════════════════════════════════════════════
          tap_text() {
            local SEARCH="$1"
            local RETRIES="${2:-3}"
            local TRY=1

            while [ $TRY -le $RETRIES ]; do
              adb shell uiautomator dump /data/local/tmp/window_dump.xml > /dev/null 2>&1
              adb pull /data/local/tmp/window_dump.xml ./window_dump.xml > /dev/null 2>&1

              # Match either text="...SEARCH..." or content-desc="...SEARCH..."
              # on the SAME xml node, then grab that node's bounds
              COORDS=$(grep -oP '<node[^>]*(text|content-desc)="[^"]*'"$SEARCH"'[^"]*"[^>]*bounds="\[[0-9]+,[0-9]+\]\[[0-9]+,[0-9]+\]"' window_dump.xml \
                        | grep -oP 'bounds="\[[0-9]+,[0-9]+\]\[[0-9]+,[0-9]+\]"' \
                        | sed 's/bounds="//; s/"//' \
                        | head -n 1)

              rm -f window_dump.xml

              if [ -n "$COORDS" ]; then
                X1=$(echo "$COORDS" | sed -E 's/\[([0-9]+),([0-9]+)\]\[([0-9]+),([0-9]+)\]/\1/')
                Y1=$(echo "$COORDS" | sed -E 's/\[([0-9]+),([0-9]+)\]\[([0-9]+),([0-9]+)\]/\2/')
                X2=$(echo "$COORDS" | sed -E 's/\[([0-9]+),([0-9]+)\]\[([0-9]+),([0-9]+)\]/\3/')
                Y2=$(echo "$COORDS" | sed -E 's/\[([0-9]+),([0-9]+)\]\[([0-9]+),([0-9]+)\]/\4/')
                CX=$(( (X1 + X2) / 2 ))
                CY=$(( (Y1 + Y2) / 2 ))
                echo "  🎯 Found \"$SEARCH\" at bounds=$COORDS -> tapping ($CX, $CY)"
                adb shell input tap "$CX" "$CY"
                sleep 2
                return 0
              fi

              echo "  ⏳ \"$SEARCH\" not found (try $TRY/$RETRIES), waiting..."
              sleep 2
              TRY=$((TRY+1))
            done

            echo "  ❌ \"$SEARCH\" NOT FOUND after $RETRIES tries — skipping this tap"
            return 1
          }

          # ════════════════════════════════════════════════════════════════
          # HELPER: shot "<filename_without_ext>"  — numbered screenshot
          # ════════════════════════════════════════════════════════════════
          shot() {
            STEP=$((STEP+1))
            local NAME=$(printf "%02d_%s" "$STEP" "$1")
            adb exec-out screencap -p > "screenshots/${NAME}.png"
            echo "  📸 Saved screenshots/${NAME}.png"
          }

          # ── Download APK ────────────────────────────────────────────────
          echo ">>> Downloading APK..."
          curl -L \
            "https://github.com/Vishnu-Hack39965/App-Creation/releases/download/v1.0.63/app-debug.apk" \
            -o /tmp/app-debug.apk
          echo "APK size: $(du -sh /tmp/app-debug.apk)"

          echo ">>> Installing APK"
          adb install -r /tmp/app-debug.apk

          adb shell pm grant "$PKG" android.permission.ACCESS_FINE_LOCATION   2>/dev/null || true
          adb shell pm grant "$PKG" android.permission.ACCESS_COARSE_LOCATION 2>/dev/null || true
          # Revoke right away — we want the app's own permission flow visible
          adb shell pm revoke "$PKG" android.permission.ACCESS_FINE_LOCATION   2>/dev/null || true
          adb shell pm revoke "$PKG" android.permission.ACCESS_COARSE_LOCATION 2>/dev/null || true

          adb shell input keyevent 82
          sleep 2

          echo ">>> Starting screen recording"
          adb shell screenrecord --time-limit 170 /sdcard/demo.mp4 &
          RECORD_PID=$!
          sleep 2

          # ════════════════════════════════════════════════════════════════
          # PHOTO: Main screen (first launch)
          # ════════════════════════════════════════════════════════════════
          echo "=== Launching app: Main Screen ==="
          adb shell am start -n "$MAIN"
          sleep $DELAY
          shot "main_screen"

          # ════════════════════════════════════════════════════════════════
          # Handle Android system location permission dialog
          # Look for "Only this time" / "While using the app" / "Allow"
          # ════════════════════════════════════════════════════════════════
          echo "=== Handling location permission dialog ==="
          tap_text "Only this time" 3 || tap_text "While using the app" 2 || tap_text "Allow" 2
          sleep $DELAY

          # ════════════════════════════════════════════════════════════════
          # The app should now auto-open Chrome Custom Tab (home page).
          # Handle Chrome's first-run dialogs.
          # ════════════════════════════════════════════════════════════════
          echo "=== Handling Chrome welcome dialog ==="
          tap_text "Accept & continue" 4
          sleep 3
          shot "chrome_after_accept"

          echo "=== Handling Chrome sign-in dialog ==="
          tap_text "No thanks" 3
          sleep 3
          shot "chrome_home_page"

          # ════════════════════════════════════════════════════════════════
          # Go back to the app
          # ════════════════════════════════════════════════════════════════
          echo "=== Returning to app ==="
          adb shell input keyevent KEYCODE_BACK
          sleep 2
          adb shell am start -n "$MAIN"
          sleep $DELAY
          shot "main_screen_again"

          # ════════════════════════════════════════════════════════════════
          # Tap "OFFLINE DASHBOARD" button by text search
          # ════════════════════════════════════════════════════════════════
          echo "=== Opening Offline Dashboard ==="
          tap_text "OFFLINE DASHBOARD" 3
          sleep $DELAY
          shot "dashboard_no_data"

          # ════════════════════════════════════════════════════════════════
          # Tap "Load Sample Data" / "Temporary Data" test button
          # ════════════════════════════════════════════════════════════════
          echo "=== Loading sample/test data ==="
          tap_text "Sample Data" 2 || tap_text "Temporary Data" 2 || tap_text "Test" 2
          sleep 5
          shot "dashboard_after_sample_tap"

          # ════════════════════════════════════════════════════════════════
          # Scroll to top to show full dashboard (name, timer, etc.)
          # ════════════════════════════════════════════════════════════════
          echo "=== Scrolling to dashboard top ==="
          adb shell input swipe 540 600 540 1600 400
          sleep 2
          shot "dashboard_top_with_data"

          # ════════════════════════════════════════════════════════════════
          # Scroll down to reveal WiFi connect buttons
          # ════════════════════════════════════════════════════════════════
          echo "=== Scrolling to WiFi buttons ==="
          adb shell input swipe 540 1600 540 500 500
          sleep 2
          shot "dashboard_wifi_buttons"

          # Re-grant location so the WiFi-connect flow actually works
          adb shell pm grant "$PKG" android.permission.ACCESS_FINE_LOCATION 2>/dev/null || true

          # ════════════════════════════════════════════════════════════════
          # Tap "Connect to" WiFi button by text search
          # ════════════════════════════════════════════════════════════════
          echo "=== Tapping WiFi connect button ==="
          tap_text "Connect to" 3
          sleep 4
          shot "after_wifi_connect"

          # ════════════════════════════════════════════════════════════════
          # Go back to Main screen
          # ════════════════════════════════════════════════════════════════
          echo "=== Returning to Main screen ==="
          adb shell input keyevent KEYCODE_BACK
          sleep 4
          shot "main_after_dashboard"

          # ════════════════════════════════════════════════════════════════
          # Tap "GO TO HOME PAGE" button by text search
          # ════════════════════════════════════════════════════════════════
          echo "=== Tapping Go To Home Page ==="
          tap_text "GO TO HOME PAGE" 3
          sleep 8
          shot "home_page_cct_final"

          # ── Pull video ──────────────────────────────────────────────────
          echo "=== Pulling video ==="
          kill $RECORD_PID 2>/dev/null || true
          adb shell pkill -2 screenrecord 2>/dev/null || true
          sleep 5
          adb pull /sdcard/demo.mp4 screenshots/demo.mp4 \
            && echo "✓ Video pulled" \
            || echo "✗ Video pull failed"

          echo "=== All done ==="
          ls -lh screenshots/
          SCRIPT
          chmod +x capture.sh

      - name: Run emulator and capture
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: pixel_4
          force-avd-creation: true
          emulator-options: >-
            -no-snapshot
            -no-audio
            -no-window
            -no-boot-anim
            -gpu swiftshader_indirect
            -no-metrics
            -memory 2048
            -cores 2
            -camera-back none
          disable-animations: true
          script: bash capture.sh

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots-and-video
          path: screenshots/
          if-no-files-found: warn

      - name: Push screenshots into repo
        if: always()
        run: |
          FOLDER="screenshots/run-${{ github.run_number }}"
          mkdir -p "$FOLDER"
          cp screenshots/*.png    "$FOLDER/" 2>/dev/null || true
          cp screenshots/demo.mp4 "$FOLDER/" 2>/dev/null || true

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$FOLDER"
          git diff --cached --quiet \
            || git commit -m "ci: screenshots & video run #${{ github.run_number }}"
          git push origin The-working-app
