name: Build & Release APK

on:
#  push:
#    branches: [ main ]   # Uncomment to auto-build on every commit
  workflow_dispatch:       # Manual trigger for now

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle ──────────────────────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 4. Decode secrets ──────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/android/app/release.keystore" >> $GITHUB_ENV

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode \
            > android/app/google-services.json

      # ── 5. Build signed APK ────────────────────────────────────────────────
      - name: Build Release APK
        env:
          KEYSTORE_PATH:     ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
          WEB_CLIENT_ID:     ${{ secrets.WEB_CLIENT_ID }}
          VERSION_CODE:      ${{ github.run_number }}
        run: |
          cd android
          ./gradlew assembleDebug \
            -PKEYSTORE_PATH="$KEYSTORE_PATH" \
            -PKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
            -PKEY_ALIAS="$KEY_ALIAS" \
            -PKEY_PASSWORD="$KEY_PASSWORD"

      # ── 6. Rename APK to consistent filename ───────────────────────────────
      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk app-debug.apk

      # ── 7. Upload artifact ─────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: library-debug-apk
          path: app-debug.apk

      # ── 8. Publish GitHub Release ──────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Library App v1.0.${{ github.run_number }}
          body: |
            Rakshapal Singh Library App — build ${{ github.run_number }}
            Signed with release keystore · Auto-update enabled
          files: app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Cleanup secrets from runner ────────────────────────────────────
      - name: Remove keystore from runner
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/app/google-services.json
