name: Build & Release APK (with signing verification)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Print keystore signing info
        run: |
          echo "======= KEYSTORE SIGNING REPORT ======="
          keytool -list -v \
            -keystore android/app/release.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            2>/dev/null | grep -E "Alias|SHA1|SHA256|MD5|Valid|Owner|Issuer"
          echo "======================================="

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew clean assembleRelease \
            -PKEYSTORE_FILE=release.jks \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            -PWEB_CLIENT_ID="${{ secrets.WEB_CLIENT_ID }}"

      - name: Print APK signing info
        run: |
          APKSIGNER=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner
          echo "======= APK SIGNING REPORT ======="
          $APKSIGNER verify --verbose --print-certs \
            android/app/build/outputs/apk/release/app-release.apk \
            | grep -E "SHA|MD5|scheme|verified"
          echo "=================================="

      - name: Save signing report to file
        run: |
          APKSIGNER=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner
          {
            echo "======= KEYSTORE SIGNING REPORT ======="
            keytool -list -v \
              -keystore android/app/release.jks \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -alias "${{ secrets.KEY_ALIAS }}" \
              2>/dev/null | grep -E "Alias|SHA1|SHA256|MD5|Valid|Owner|Issuer"
            echo ""
            echo "======= APK SIGNING REPORT ======="
            $APKSIGNER verify --verbose --print-certs \
              android/app/build/outputs/apk/release/app-release.apk \
              | grep -E "SHA|MD5|scheme|verified"
          } > signing-report.txt
          cat signing-report.txt

      - name: Upload APK + signing report
        uses: actions/upload-artifact@v4
        with:
          name: library-release-apk
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            signing-report.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Library App v1.0.${{ github.run_number }}
          body: |
            Signed release of Rakshapal Singh Library App
            Built from commit ${{ github.sha }}
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            signing-report.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
